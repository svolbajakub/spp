<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sociální první pomoc - ZZS ÚK</title>
    
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        :root {
            --zzs-blue: #005eb8;
            --zzs-red: #e4002b;
            --light-bg: #f8f9fa;
            --border: #dee2e6;
            --text: #333;
            --touch-target: 50px;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light-bg);
            margin: 0; padding: 0; color: var(--text);
            -webkit-tap-highlight-color: transparent;
            line-height: 1.5;
        }

        header {
            background-color: white; padding: 10px 15px;
            border-bottom: 2px solid var(--zzs-blue); position: sticky; top: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            min-height: 60px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .header-logo {
            position: absolute; left: 15px; height: 40px; width: 40px; object-fit: contain;
        }

        header h1 { 
            margin: 0; font-size: 0.95rem; color: var(--zzs-blue); 
            text-transform: uppercase; font-weight: 800; text-align: center; 
            padding: 0 45px; 
        }

        /* Vyhledávání */
        .search-area { background: white; padding: 12px; border-bottom: 1px solid var(--border); }
        .search-wrapper { position: relative; max-width: 800px; margin: auto; }

        #searchInput {
            width: 100%; height: var(--touch-target); padding: 0 45px 0 15px; 
            border: 2px solid var(--border); border-radius: 12px; 
            font-size: 1rem; box-sizing: border-box; background-color: #f1f3f5;
            transition: border-color 0.2s;
        }

        #searchInput:focus { border-color: var(--zzs-blue); outline: none; background-color: white; }

        .clear-search {
            position: absolute; right: 5px; top: 0;
            width: 45px; height: var(--touch-target);
            display: none; align-items: center; justify-content: center;
            cursor: pointer; color: #adb5bd; font-size: 1.2rem;
        }

        /* Container */
        .container { padding: 10px; max-width: 800px; margin: auto; padding-bottom: 100px; }

        /* Accordion */
        .category-item { background: white; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .category-header { 
            padding: 0 15px; height: 60px; display: flex; align-items: center; 
            cursor: pointer; user-select: none; transition: background 0.2s;
        }
        .category-header:active { background-color: #f8f9fa; }

        .category-icon { font-size: 1.5rem; margin-right: 15px; min-width: 30px; text-align: center; }
        .category-title { flex-grow: 1; font-weight: 700; font-size: 1.05rem; }

        .chevron {
            border: solid #adb5bd; border-width: 0 3px 3px 0; display: inline-block;
            padding: 4px; transform: rotate(45deg); transition: transform 0.3s;
        }

        .category-item.active .chevron { transform: rotate(-135deg); }
        .category-item.active .category-header { background-color: #f1f8ff; border-bottom: 1px solid var(--border); }

        .category-content { display: none; padding: 0 15px; background-color: #fff; }
        .category-item.active .category-content { display: block; }

        /* Kontakty */
        .contact-entry { padding: 20px 0; border-bottom: 1px solid #eee; }
        .contact-entry:last-child { border-bottom: none; }
        .contact-entry.hidden { display: none; }

        .org-name { font-weight: 800; color: var(--zzs-blue); margin-bottom: 8px; display: block; font-size: 1.15rem; }
        .org-detail { font-size: 0.95rem; margin-bottom: 15px; }
        .detail-row { display: flex; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #f9f9f9; }
        .detail-label { font-weight: bold; min-width: 90px; color: #666; }
        
        /* Tlačítka */
        .action-buttons { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            display: flex; align-items: center; justify-content: center; 
            height: var(--touch-target); border-radius: 10px; 
            text-decoration: none; font-weight: 800; font-size: 1.05rem;
            border: 2px solid transparent; transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }

        .btn-call { border-color: var(--zzs-red); color: var(--zzs-red); }
        .btn-call:active { background-color: var(--zzs-red); color: white; }
        .btn-web { border-color: var(--zzs-blue); color: var(--zzs-blue); }
        .btn-mail { border-color: #6c757d; color: #6c757d; }

        .no-results { text-align: center; padding: 50px 20px; color: #999; display: none; font-weight: 600; }
        
        /* Highlight */
        mark { background: #fff3cd; color: inherit; padding: 0; }
    </style>
</head>

            contacts: [
                { name: 'Aplikace Nepanikař', desc: 'Mobilní appka - první pomoc u paniky a deprese.', time: 'Chat Po-Pá 16-22, Ne 14-20', web: 'https://nepanikar.eu', mail: 'pomoc@nepanikar.eu' },
                { name: 'Psychosociální pomoc HZS ÚK', desc: 'Posttraumatická péče Hasičského záchranného sboru.', time: 'Vyžádání přes KOPIS 112/150', phone: '150' }
            ]
        }
    ];

    const mainContent = document.getElementById('mainContent');
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearButton');
    const noResults = document.getElementById('noResults');

    function init() {
        render(DATA);
        setupListeners();
    }

    function render(data, term = '') {
        // Vyčistíme starý obsah (kromě noResults)
        const currentItems = mainContent.querySelectorAll('.category-item');
        currentItems.forEach(el => el.remove());

        data.forEach(cat => {
            const item = document.createElement('div');
            item.className = 'category-item';
            if (term.length > 1) item.classList.add('active');

            item.innerHTML = `
                <div class="category-header">
                    <div class="category-icon">${cat.icon}</div>
                    <div class="category-title">${highlight(cat.title, term)}</div>
                    <div class="chevron"></div>
                </div>
                <div class="category-content">
                    ${cat.contacts.map(con => `
                        <div class="contact-entry">
                            <span class="org-name">${highlight(con.name, term)}</span>
                            <div class="org-detail">
                                ${con.addr ? `<div class="detail-row"><span class="detail-label">Adresa:</span><span>${highlight(con.addr, term)}</span></div>` : ''}
                                ${con.desc ? `<div class="detail-row"><span class="detail-label">Popis:</span><span>${highlight(con.desc, term)}</span></div>` : ''}
                                ${con.time ? `<div class="detail-row"><span class="detail-label">Doba:</span><span>${highlight(con.time, term)}</span></div>` : ''}
                            </div>
                            <div class="action-buttons">
                                ${con.phone ? `<a href="tel:${con.phone.replace(/\s/g, '')}" class="btn btn-call">📞 Volat ${con.phone}</a>` : ''}
                                ${con.web ? `<a href="${con.web}" target="_blank" class="btn btn-web">Webové stránky</a>` : ''}
                                ${con.mail ? `<a href="mailto:${con.mail}" class="btn btn-mail">Poslat Email</a>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            mainContent.insertBefore(item, noResults);
        });
    }

    function setupListeners() {
        // Accordion logika (pouze jeden otevřený)
        mainContent.addEventListener('click', (e) => {
            const header = e.target.closest('.category-header');
            if (!header) return;

            const item = header.parentElement;
            const wasActive = item.classList.contains('active');
            
            // Zavřít ostatní
            document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
            
            if (!wasActive) {
                item.classList.add('active');
                vibrate(40);
                setTimeout(() => {
                    item.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            }
        });

        // Vyhledávání s debouncem
        searchInput.addEventListener('input', debounce(() => {
            const term = searchInput.value.toLowerCase().trim();
            clearBtn.style.display = term ? 'flex' : 'none';
            
            const filtered = DATA.filter(cat => {
                const inHeader = cat.title.toLowerCase().includes(term) || cat.keywords.toLowerCase().includes(term);
                const inContacts = cat.contacts.some(c => 
                    c.name.toLowerCase().includes(term) || 
                    (c.desc && c.desc.toLowerCase().includes(term)) ||
                    (c.addr && c.addr.toLowerCase().includes(term))
                );
                return inHeader || inContacts;
            });

            render(filtered, term);
            noResults.style.display = filtered.length ? 'none' : 'block';
        }, 150));

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.style.display = 'none';
            render(DATA);
            noResults.style.display = 'none';
            searchInput.focus();
        });
    }

    // Pomocné funkce
    function highlight(text, term) {
        if (!term || term.length < 2) return text;
        const reg = new RegExp(`(${term})`, 'gi');
        return text.replace(reg, '<mark>$1</mark>');
    }

    function debounce(func, wait) {
        let timeout;
        return function() {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, arguments), wait);
        };
    }

    function vibrate(ms) {
        if (navigator.vibrate) navigator.vibrate(ms);
    }

    init();
</script>
